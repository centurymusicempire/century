<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Century Music Empire</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b0b0b;
color:white;
}

nav{
position:fixed;
width:100%;
background:#000;
padding:15px;
text-align:center;
}
nav a{
color:gold;
margin:15px;
text-decoration:none;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819');
background-size:cover;
}

.logo{
font-size:40px;
color:gold;
}

.btn{
background:gold;
color:black;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
}

section{
padding:80px 20px;
text-align:center;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#111;
padding:15px;
margin:15px;
border-radius:15px;
width:300px;
}

.admin{
background:#111;
padding:20px;
margin-top:40px;
}

input{
padding:10px;
margin:5px;
width:80%;
}

button{
padding:10px;
background:gold;
border:none;
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#music">Music</a>
<a href="#gallery">Gallery</a>
<a href="#admin">Admin</a>
</nav>

<header id="home">
<div class="logo">CENTURY MUSIC EMPIRE</div>
<p>Distribution • Talent • Changing Lives</p>
</header>

<section>
<h2>About</h2>
<p>Founded by Eddy Kikoyo</p>
<p>Head IT & Marketing: Rapking256Official</p>
<p>Studio: Sound Box Records – Konge Upper</p>
</section>

<section id="music">
<h2>Music</h2>
<div class="grid" id="musicList"></div>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div id="galleryList"></div>
</section>

<section class="admin" id="admin">
<h2>Admin Panel</h2>

<input id="songTitle" placeholder="Song name">
<input id="songLink" placeholder="YouTube link">
<button onclick="addSong()">Add Song</button>

<input type="file" id="imgUpload">
<button onclick="uploadImage()">Upload Image</button>
</section>

<script>
let songs = JSON.parse(localStorage.getItem("songs")) || [];
let images = JSON.parse(localStorage.getItem("images")) || [];

function displaySongs(){
let list=document.getElementById("musicList");
list.innerHTML="";
songs.forEach(s=>{
list.innerHTML+=`
<div class="card">
<h3>${s.title}</h3>
<iframe width="100%" height="200" src="${s.link}"></iframe>
</div>`;
});
}

function addSong(){
let title=document.getElementById("songTitle").value;
let link=document.getElementById("songLink").value;
let embed=link.replace("watch?v=","embed/");
songs.push({title:title,link:embed});
localStorage.setItem("songs",JSON.stringify(songs));
displaySongs();
}

function uploadImage(){
let file=document.getElementById("imgUpload").files[0];
let reader=new FileReader();
reader.onload=function(){
images.push(reader.result);
localStorage.setItem("images",JSON.stringify(images));
displayImages();
}
reader.readAsDataURL(file);
}

function displayImages(){
let g=document.getElementById("galleryList");
g.innerHTML="";
images.forEach(img=>{
g.innerHTML+=`<img src="${img}" width="200">`;
});
}

displaySongs();
displayImages();
</script>

</body>
</html>
